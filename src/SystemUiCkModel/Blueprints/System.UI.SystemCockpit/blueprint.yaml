$schema: https://schemas.meshmakers.cloud/blueprint-meta.schema.json
blueprintId: System.UI.SystemCockpit-1.0.0
description: |
  Service-managed blueprint seeding the System Cockpit dashboard for the OctoSystem
  tenant. Provides a fixed Refinery Studio start page (rtWellKnownName "cockpit") with
  KPI tiles for tenant count, service health checks, CK model status and event counters.
  Auto-applied by the Admin Panel service on tenant Enable / startup; only the system
  tenant receives this blueprint — non-system tenants get System.UI.TenantCockpit instead.
  Following the OctoMesh "System.* = service-managed" convention, Studio hides Install /
  Re-apply controls for this blueprint.

ckModelDependencies:
  # Satisfiability floor only. The install/upgrade target is driven by the engine's
  # IServiceManagedCkModelDescriptor (System.UI embedded version), registered in
  # platform-services Program.cs — NOT by this range. Raise the floor only when this
  # blueprint's SEED needs a type/attribute introduced in a specific System.UI version;
  # a plain CK model bump needs no change here.
  - System.UI-[2.2.0,3.0)

seedDataPath: seed-data/entities.yaml

# Apply only to the OctoSystem tenant. The companion blueprint
# System.UI.TenantCockpit gates on the opposite value so the AdminPanel service can
# apply both blueprints unconditionally and the runtime picks the right one per tenant.
requires:
  octo.isSystemTenant: "true"
